name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack prepare pnpm@10.6.2 --activate

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Verify
        run: corepack pnpm verify:all

